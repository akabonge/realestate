<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0f2236"/>
  <!-- House shadow/base -->
  <rect x="8" y="17" width="16" height="11" rx="1.5" fill="#1a3a5c"/>
  <!-- House body -->
  <rect x="9" y="17" width="14" height="10" rx="1" fill="#2563a8"/>
  <!-- Roof -->
  <polygon points="16,6 27,17 5,17" fill="#f0b429"/>
  <!-- Door -->
  <rect x="13.5" y="21" width="5" height="6" rx="1.5" fill="#0f2236"/>
  <!-- Window -->
  <rect x="10" y="20" width="3.5" height="3" rx="0.5" fill="#93c5fd" opacity="0.9"/>
  <!-- Neural spark above roof — the AI accent -->
  <circle cx="16" cy="4" r="1.8" fill="#f0b429"/>
  <circle cx="21" cy="3.5" r="1.2" fill="#C9A84C" opacity="0.7"/>
  <line x1="16" y1="4" x2="21" y2="3.5" stroke="#f0b429" stroke-width="0.8" opacity="0.6"/>
  <circle cx="11" cy="3.5" r="1.2" fill="#C9A84C" opacity="0.7"/>
  <line x1="16" y1="4" x2="11" y2="3.5" stroke="#f0b429" stroke-width="0.8" opacity="0.6"/>
</svg>
